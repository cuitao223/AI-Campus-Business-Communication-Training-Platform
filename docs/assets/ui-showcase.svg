<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#536dfe"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#2d3e6e" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="700" rx="38" fill="url(#bg)"/>
  <text x="60" y="76" font-family="Microsoft YaHei, Arial" font-size="32" font-weight="700" fill="#18245c">核心界面示意</text>
  <text x="60" y="114" font-family="Microsoft YaHei, Arial" font-size="18" fill="#607095">Apple 风格玻璃面板、头像、动效和数据反馈</text>

  <g filter="url(#shadow)">
    <rect x="78" y="154" width="690" height="470" rx="28" fill="#ffffff" opacity="0.92"/>
    <rect x="78" y="154" width="690" height="76" rx="28" fill="#eef4ff"/>
    <text x="118" y="202" font-family="Microsoft YaHei, Arial" font-size="22" font-weight="700" fill="#18245c">对话训练</text>
    <rect x="118" y="270" width="420" height="70" rx="16" fill="#ffffff" stroke="#d8e2ff"/>
    <circle cx="98" cy="304" r="20" fill="#09a6a3"/>
    <text x="142" y="300" font-family="Microsoft YaHei, Arial" font-size="14" fill="#7b88a8">奶茶店店长</text>
    <text x="142" y="323" font-family="Microsoft YaHei, Arial" font-size="17" fill="#405077">试用期 12 元太低，我希望至少 16 元。</text>
    <rect x="352" y="382" width="366" height="70" rx="16" fill="url(#bubble)"/>
    <circle cx="740" cy="416" r="20" fill="#536dfe"/>
    <text x="382" y="412" font-family="Microsoft YaHei, Arial" font-size="17" fill="#fff">我可以接受试用，但需要明确排班和结算。</text>
    <rect x="118" y="500" width="600" height="74" rx="16" fill="#f8fbff" stroke="#d8e2ff"/>
    <text x="142" y="545" font-family="Microsoft YaHei, Arial" font-size="17" fill="#607095">输入你的回复，也可以点击语音输入...</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="154" width="310" height="134" rx="24" fill="#ffffff" opacity="0.94"/>
    <text x="842" y="196" font-family="Microsoft YaHei, Arial" font-size="20" font-weight="700" fill="#18245c">谈判热力条</text>
    <text x="842" y="232" font-family="Microsoft YaHei, Arial" font-size="15" fill="#607095">信任度、压力、成交可能性、风险等级</text>
    <rect x="842" y="252" width="220" height="10" rx="5" fill="#edf2ff"/>
    <rect x="842" y="252" width="150" height="10" rx="5" fill="#09a6a3"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="318" width="310" height="134" rx="24" fill="#ffffff" opacity="0.94"/>
    <text x="842" y="360" font-family="Microsoft YaHei, Arial" font-size="20" font-weight="700" fill="#18245c">AI 对手出场</text>
    <circle cx="862" cy="408" r="24" fill="#8b5cf6"/>
    <text x="902" y="403" font-family="Microsoft YaHei, Arial" font-size="15" fill="#607095">压价型</text>
    <text x="902" y="426" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="700" fill="#18245c">甲方客户登场</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="482" width="310" height="142" rx="24" fill="#ffffff" opacity="0.94"/>
    <text x="842" y="524" font-family="Microsoft YaHei, Arial" font-size="20" font-weight="700" fill="#18245c">复盘与成就</text>
    <text x="842" y="558" font-family="Microsoft YaHei, Arial" font-size="16" fill="#607095">风险雷达、稳健报价官、反压价高手</text>
    <rect x="842" y="582" width="92" height="28" rx="14" fill="#eefdf9"/>
    <text x="888" y="602" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="14" fill="#0f766e">奖牌弹窗</text>
  </g>
</svg>

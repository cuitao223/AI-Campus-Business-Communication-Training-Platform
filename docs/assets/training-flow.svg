<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f7ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#536dfe"/>
      <stop offset="1" stop-color="#09a6a3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#2d3e6e" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="560" rx="36" fill="#f8fbff"/>
  <text x="60" y="76" font-family="Microsoft YaHei, Arial" font-size="32" font-weight="700" fill="#18245c">训练流程图</text>
  <text x="60" y="114" font-family="Microsoft YaHei, Arial" font-size="18" fill="#607095">从选择场景到复盘成长，形成完整闭环</text>

  <path d="M180 282 H1020" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Microsoft YaHei, Arial" text-anchor="middle" filter="url(#shadow)">
    <g>
      <rect x="80" y="190" width="190" height="180" rx="24" fill="url(#card)"/>
      <circle cx="175" cy="244" r="30" fill="#536dfe"/>
      <text x="175" y="254" font-size="24" font-weight="700" fill="#fff">1</text>
      <text x="175" y="306" font-size="21" font-weight="700" fill="#18245c">选择场景</text>
      <text x="175" y="338" font-size="15" fill="#607095">兼职、接单、创业、二手交易</text>
    </g>
    <g>
      <rect x="314" y="190" width="190" height="180" rx="24" fill="url(#card)"/>
      <circle cx="409" cy="244" r="30" fill="#09a6a3"/>
      <text x="409" y="254" font-size="24" font-weight="700" fill="#fff">2</text>
      <text x="409" y="306" font-size="21" font-weight="700" fill="#18245c">设置参数</text>
      <text x="409" y="338" font-size="15" fill="#607095">身份、目标、底线、难度</text>
    </g>
    <g>
      <rect x="548" y="190" width="190" height="180" rx="24" fill="url(#card)"/>
      <circle cx="643" cy="244" r="30" fill="#8b5cf6"/>
      <text x="643" y="254" font-size="24" font-weight="700" fill="#fff">3</text>
      <text x="643" y="306" font-size="21" font-weight="700" fill="#18245c">AI 对话训练</text>
      <text x="643" y="338" font-size="15" fill="#607095">角色扮演、语音、热力条</text>
    </g>
    <g>
      <rect x="782" y="190" width="190" height="180" rx="24" fill="url(#card)"/>
      <circle cx="877" cy="244" r="30" fill="#f59e0b"/>
      <text x="877" y="254" font-size="24" font-weight="700" fill="#fff">4</text>
      <text x="877" y="306" font-size="21" font-weight="700" fill="#18245c">自动判定</text>
      <text x="877" y="338" font-size="15" fill="#607095">成交、未达预期、继续谈</text>
    </g>
    <g>
      <rect x="1016" y="190" width="150" height="180" rx="24" fill="url(#card)"/>
      <circle cx="1091" cy="244" r="30" fill="#10b981"/>
      <text x="1091" y="254" font-size="24" font-weight="700" fill="#fff">5</text>
      <text x="1091" y="306" font-size="21" font-weight="700" fill="#18245c">复盘成长</text>
      <text x="1091" y="338" font-size="15" fill="#607095">称号、成就、曲线</text>
    </g>
  </g>
</svg>
